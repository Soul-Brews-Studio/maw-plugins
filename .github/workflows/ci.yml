name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/*/target
          key: cargo-${{ runner.os }}-${{ hashFiles('packages/*/Cargo.lock') }}

      - name: Build all wasm packages
        run: |
          set -euo pipefail
          for dir in packages/*/; do
            [ -f "$dir/Cargo.toml" ] || continue
            echo "::group::build $dir"
            cargo build --release --target wasm32-unknown-unknown --manifest-path "$dir/Cargo.toml"
            echo "::endgroup::"
          done

      # No host-target `cargo test` here: these are extism GUEST crates — their
      # imports (load_u8/store_u64/alloc/…) exist only inside the extism runtime,
      # so a native test binary can never link (proven by 20-mega on this repo's
      # first CI run). Behavior is tested host-side by maw-rs's parity/invoke
      # harness against the committed, sha256-pinned plugin.wasm.

      - name: Pin integrity — committed plugin.wasm vs manifest sha256
        # Verifies the COMMITTED artifact matches its manifest pin.
        # Deliberately does NOT compare a rebuilt wasm against the pin:
        # rebuild determinism is unproven (maw-rs determinism test is #[ignore]d).
        run: |
          set -euo pipefail
          fail=0
          for dir in packages/*/; do
            [ -f "$dir/plugin.wasm" ] || continue
            [ -f "$dir/plugin.json" ] || { echo "FAIL $dir: plugin.wasm without plugin.json"; fail=1; continue; }
            pin=$(jq -r '.artifact.sha256 // empty' "$dir/plugin.json" | sed 's/^sha256://')
            # A dev-tier-active fleet plugin keeps plugin.json on bun-dev and
            # pins its pre-staged wasm in plugin.source.json instead.
            if [ -z "$pin" ] && [ -f "$dir/plugin.source.json" ]; then
              pin=$(jq -r '.artifact.sha256 // empty' "$dir/plugin.source.json" | sed 's/^sha256://')
            fi
            if [ -z "$pin" ]; then
              echo "FAIL $dir: manifest missing artifact.sha256"
              fail=1
              continue
            fi
            actual=$(sha256sum "$dir/plugin.wasm" | cut -d' ' -f1)
            if [ "$pin" = "$actual" ]; then
              echo "OK   $dir ($actual)"
            else
              echo "FAIL $dir: pin $pin != actual $actual"
              fail=1
            fi
          done
          exit $fail

  # Bun tests for the fleet plugins imported from maw-rs fleet-plugins/
  # (repo split phase 1). Ported from maw-rs .github/workflows/ci.yml
  # "Fleet-plugin bun tests".
  fleet-bun-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Fleet-plugin bun tests
        shell: bash
        run: |
          set -euo pipefail
          found=0
          for pkg in packages/*; do
            [ -d "$pkg" ] || continue

            shopt -s nullglob
            tests=("$pkg"/src/*.test.ts)
            shopt -u nullglob
            if [ "${#tests[@]}" -eq 0 ]; then
              continue
            fi

            if [ -f "$pkg/package.json" ]; then
              echo "::group::bun install $(basename "$pkg")"
              # Best-effort: resolving inside the workspace also resolves the
              # legacy packages' unpublished maw-js dep (linked by
              # scripts/setup.sh in dev) and 404s; the fleet plugins' tests do
              # not need it, so warn and keep going.
              (cd "$pkg" && bun install) \
                || echo "warn: bun install failed in $pkg (unpublished workspace dep); running tests anyway"
              echo "::endgroup::"
            fi

            found=1
            rel_tests=()
            for test in "${tests[@]}"; do
              rel_tests+=("./${test#$pkg/}")
            done

            echo "::group::bun test $(basename "$pkg")"
            (cd "$pkg" && bun test "${rel_tests[@]}")
            echo "::endgroup::"
          done

          if [ "$found" -eq 0 ]; then
            echo "No fleet-plugin bun tests found; skipping"
          fi

  # Native Swift helper pin + slices for packages/maw-menubar. Ported from
  # maw-rs .github/workflows/ci.yml "maw-menubar-native".
  maw-menubar-native:
    name: maw-menubar universal helper
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify committed helper pin and architecture slices
        working-directory: packages/maw-menubar
        run: |
          set -euo pipefail
          expected=$(jq -r '.bundledArtifacts[] | select(.path == "bin/maw-menubar") | .sha256' plugin.json)
          actual="sha256:$(shasum -a 256 bin/maw-menubar | awk '{print $1}')"
          [[ "$actual" == "$expected" ]]
          archs=$(/usr/bin/lipo -archs bin/maw-menubar)
          [[ " $archs " == *" arm64 "* ]]
          [[ " $archs " == *" x86_64 "* ]]
          /usr/bin/codesign --verify --strict bin/maw-menubar

      - name: Rebuild universal Swift helper
        working-directory: packages/maw-menubar
        run: ./scripts/build-universal.sh
